<!DOCTYPE html>
<html lang="ja">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI Chess Game</title>
  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Chess.js for game logic -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <style>
   /* Custom Styles & Animations */
   body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #262421;
    /* Dark theme background */
    color: #e0e0e0;
    overscroll-behavior: none;
   }

   .board-container {
    width: 100%;
    max-width: 500px;
    aspect-ratio: 1 / 1;
    margin: 0 auto;
    position: relative;
    user-select: none;
    -webkit-user-select: none;
   }

   .chess-board {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    width: 100%;
    height: 100%;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
   }

   /* Board Colors */
   .square {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
   }

   .square.white {
    background-color: #ebecd0;
   }

   .square.black {
    background-color: #779556;
   }

   /* Highlights */
   .square.selected {
    background-color: #bbc063 !important;
   }

   .square.last-move {
    background-color: rgba(255, 255, 0, 0.4) !important;
   }

   .square.possible-move::after {
    content: '';
    width: 30%;
    height: 30%;
    background-color: rgba(0, 0, 0, 0.2);
    border-radius: 50%;
    position: absolute;
   }

   .square.possible-capture::after {
    content: '';
    width: 80%;
    height: 80%;
    border: 4px solid rgba(0, 0, 0, 0.2);
    border-radius: 50%;
    position: absolute;
   }

   .square.check {
    background: radial-gradient(circle, rgba(255, 0, 0, 0.8) 0%, rgba(255, 0, 0, 0) 70%);
   }

   /* Pieces */
   .piece {
    width: 100%;
    height: 100%;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    cursor: pointer;
    z-index: 10;
    transition: transform 0.1s;
   }

   .piece:active {
    transform: scale(1.1);
   }

   /* Coordinates */
   .coord {
    position: absolute;
    font-size: 10px;
    font-weight: bold;
    pointer-events: none;
   }

   .coord.rank {
    top: 2px;
    left: 2px;
   }

   .coord.file {
    bottom: 2px;
    right: 2px;
   }

   .square.white .coord {
    color: #779556;
   }

   .square.black .coord {
    color: #ebecd0;
   }

   /* Controls */
   .modal {
    background-color: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(4px);
   }

   /* Spinner */
   .loader {
    border: 4px solid #f3f3f3;
    border-top: 4px solid #3498db;
    border-radius: 50%;
    width: 24px;
    height: 24px;
    animation: spin 1s linear infinite;
    display: inline-block;
    vertical-align: middle;
   }

   @keyframes spin {
    0% {
     transform: rotate(0deg);
    }

    100% {
     transform: rotate(360deg);
    }
   }
  </style>
 </head>
 <body class="h-screen w-screen flex flex-col items-center justify-center p-4">

  <!-- Header & Status -->
  <div class="w-full max-w-[500px] flex justify-between items-center mb-2 text-sm md:text-base">
   <div class="flex items-center gap-2">
    <h1 class="font-bold text-xl text-yellow-500">Chess AI</h1>
   </div>
   <div id="status" class="font-semibold bg-gray-700 px-3 py-1 rounded text-white">設定を選んで開始</div>
  </div>

  <!-- Game Area -->
  <div class="board-container">
   <div id="board" class="chess-board">
    <!-- Squares generated by JS -->
   </div>

   <!-- Thinking Indicator Overlay -->
   <div id="thinking-overlay" class="hidden absolute inset-0 bg-black/30 z-20 flex items-center justify-center">
    <div class="bg-gray-800 text-white px-4 py-2 rounded-lg shadow-lg flex items-center gap-2">
     <div class="loader"></div>
     <span>AI思考中...</span>
    </div>
   </div>
  </div>

  <!-- Controls -->
  <div class="w-full max-w-[500px] mt-4 grid grid-cols-2 gap-2">
   <button onclick="showSettings()"
    class="bg-gray-600 hover:bg-gray-500 text-white py-3 rounded-lg font-bold transition">
    新規ゲーム / 設定
   </button>
   <button onclick="undoMove()" class="bg-gray-700 hover:bg-gray-600 text-white py-3 rounded-lg font-bold transition">
    待った (Undo)
   </button>
  </div>

  <!-- Move History (Brief) -->
  <div class="w-full max-w-[500px] mt-2 text-xs text-gray-400 text-center h-4">
   <span id="fen-debug"></span>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal fixed inset-0 z-50 flex items-center justify-center">
   <div class="bg-gray-800 p-6 rounded-xl shadow-2xl w-11/12 max-w-sm border border-gray-700">
    <h2 class="text-2xl font-bold mb-4 text-center text-white">ゲーム設定</h2>

    <div class="mb-4">
     <label class="block text-gray-300 mb-2 font-bold">あなたの色</label>
     <div class="grid grid-cols-2 gap-2">
      <button id="btn-white" onclick="setPlayerColor('w')"
       class="p-3 rounded border border-gray-600 bg-gray-200 text-black font-bold ring-2 ring-blue-500">白 (先手)</button>
      <button id="btn-black" onclick="setPlayerColor('b')"
       class="p-3 rounded border border-gray-600 bg-gray-700 text-white font-bold">黒 (後手)</button>
     </div>
    </div>

    <div class="mb-6">
     <label class="block text-gray-300 mb-2 font-bold">AIの強さ</label>
     <select id="difficulty" class="w-full p-3 rounded bg-gray-700 text-white border border-gray-600">
      <option value="1">レベル 1 (弱い)</option>
      <option value="2" selected>レベル 2 (普通)</option>
      <option value="3">レベル 3 (強い)</option>
     </select>
    </div>

    <button onclick="startGame()"
     class="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-lg font-bold text-lg shadow-lg transform transition active:scale-95">
     ゲーム開始
    </button>
   </div>
  </div>

  <!-- Game Over Modal -->
  <div id="game-over-modal" class="modal fixed inset-0 z-50 hidden flex items-center justify-center">
   <div class="bg-gray-800 p-6 rounded-xl shadow-2xl w-11/12 max-w-sm text-center border border-gray-700">
    <h2 id="game-result-title" class="text-3xl font-bold mb-2 text-white">CHECKMATE</h2>
    <p id="game-result-desc" class="text-gray-300 mb-6">White wins!</p>
    <button onclick="showSettings()"
     class="bg-yellow-600 hover:bg-yellow-500 text-white px-6 py-3 rounded-lg font-bold w-full">
     もう一度遊ぶ
    </button>
   </div>
  </div>

   /**
    * INITIALIZATION & UI
    */
   window.onload = function () {
    initBoardHTML();
    showSettings();
   };

   function initBoardHTML() {
    boardEl.innerHTML = '';
    const files = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h'];
    const ranks = ['8', '7', '6', '5', '4', '3', '2', '1'];

    // Create 64 squares
    for (let r = 0; r < 8; r++) {
     for (let f = 0; f < 8; f++) {
      const squareDiv = document.createElement('div');
      const isLight = (r + f) % 2 === 0;
      const file = files[f];
      const rank = ranks[r];
      const sqId = file + rank;

      squareDiv.className = `square ${isLight ? 'white' : 'black'}`;
      squareDiv.id = `sq-${sqId}`;
      squareDiv.dataset.square = sqId;
      squareDiv.onclick = () => onSquareClick(sqId);

      // Add coordinates
      if (f === 0) {
       const rankLabel = document.createElement('span');
       rankLabel.className = 'coord rank';
       rankLabel.innerText = rank;
       squareDiv.appendChild(rankLabel);
      }
      if (r === 7) {
       const fileLabel = document.createElement('span');
       fileLabel.className = 'coord file';
       fileLabel.innerText = file;
       squareDiv.appendChild(fileLabel);
      }

      boardEl.appendChild(squareDiv);
     }
    }
   }

   function showSettings() {
    document.getElementById('settings-modal').classList.remove('hidden');
    document.getElementById('game-over-modal').classList.add('hidden');
   }

   function setPlayerColor(color) {
    playerColor = color;
    // Update button styles
    const wBtn = document.getElementById('btn-white');
    const bBtn = document.getElementById('btn-black');
    if (color === 'w') {
     wBtn.classList.add('ring-2', 'ring-blue-500');
     bBtn.classList.remove('ring-2', 'ring-blue-500');
    } else {
     bBtn.classList.add('ring-2', 'ring-blue-500');
     wBtn.classList.remove('ring-2', 'ring-blue-500');
    }
   }

   function startGame() {
    aiDifficulty = parseInt(document.getElementById('difficulty').value);
    document.getElementById('settings-modal').classList.add('hidden');

    // Initialize Chess.js
    game = new Chess();
    selectedSquare = null;
    possibleMoves = [];

    renderBoard();
    updateStatus();

    // If player chose black, AI moves first
    if (playerColor === 'b') {
     renderBoard(true); // Flip board for black
     setTimeout(makeAiMove, 500);
    } else {
     renderBoard(false);
    }
   }

   /**
    * BOARD RENDERING
    */
   function renderBoard(flip = false) {
    // Determine orientation
    if (flip === undefined) flip = playerColor === 'b';

    // CSS trick to flip board: Rotate board 180deg, rotate pieces back 180deg
    if (flip) {
     boardEl.style.transform = 'rotate(180deg)';
    } else {
     boardEl.style.transform = 'rotate(0deg)';
    }

    // Clear old state classes
    document.querySelectorAll('.square').forEach(sq => {
     sq.classList.remove('selected', 'possible-move', 'possible-capture', 'last-move', 'check');
     // Remove pieces (keep coords)
     const piece = sq.querySelector('.piece');
     if (piece) piece.remove();

     // Handle rotation for pieces
     sq.style.transform = flip ? 'rotate(180deg)' : 'rotate(0deg)';
    });

    // Place pieces
    const boardState = game.board(); // 8x8 array
    const files = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h'];
    const ranks = ['8', '7', '6', '5', '4', '3', '2', '1'];

    for (let r = 0; r < 8; r++) {
     for (let f = 0; f < 8; f++) {
      const piece = boardState[r][f];
      if (piece) {
       const sqId = files[f] + ranks[r];
       const sqEl = document.getElementById(`sq-${sqId}`);
       const pieceHtml = PIECES_SVG[piece.color + piece.type.toUpperCase()];

       const pieceDiv = document.createElement('div');
       pieceDiv.className = 'piece';
       pieceDiv.innerHTML = pieceHtml;
       sqEl.appendChild(pieceDiv);
      }
     }
    }

    // Highlight last move
    const history = game.history({ verbose: true });
    if (history.length > 0) {
     const last = history[history.length - 1];
     document.getElementById(`sq-${last.from}`)?.classList.add('last-move');
     document.getElementById(`sq-${last.to}`)?.classList.add('last-move');
    }

    // Check indicator
    if (game.in_check()) {
     // Find king
     const turn = game.turn();
     for (let r = 0; r < 8; r++) {
      for (let f = 0; f < 8; f++) {
       const p = boardState[r][f];
       if (p && p.type === 'k' && p.color === turn) {
        const sqId = files[f] + ranks[r];
        document.getElementById(`sq-${sqId}`).classList.add('check');
       }
      }
     }
    }
   }

   function updateStatus() {
    let status = '';
    let moveColor = game.turn() === 'w' ? '白' : '黒';

    if (game.in_checkmate()) {
     status = `ゲーム終了: ${moveColor === '白' ? '黒' : '白'}の勝ち！`;
     showGameOver(moveColor === '白' ? '黒' : '白');
    } else if (game.in_draw()) {
     status = 'ゲーム終了: 引き分け';
     showGameOver('draw');
    } else {
     if (game.turn() === playerColor) {
      status = `あなたの番 (${playerColor === 'w' ? '白' : '黒'})`;
     } else {
      status = `AI思考中... (${aiDifficulty === 1 ? 'Lv.1' : aiDifficulty === 2 ? 'Lv.2' : 'Lv.3'})`;
     }
     if (game.in_check()) {
      status += ' [王手！]';
     }
    }
    statusEl.innerText = status;
   }

   /**
    * PLAYER INTERACTION
    */
   function onSquareClick(sqId) {
    // Block interaction if AI turn or Game Over
    if (game.game_over() || (game.turn() !== playerColor && !isAiThinking)) return;
    if (isAiThinking) return;

    // Remove previous highlights
    document.querySelectorAll('.possible-move, .possible-capture').forEach(el => {
     el.classList.remove('possible-move', 'possible-capture');
    });

    const piece = game.get(sqId);

    // Case 1: Clicked on a move target (Move piece)
    const move = possibleMoves.find(m => m.to === sqId);
    if (move) {
     game.move(move);
     selectedSquare = null;
     possibleMoves = [];
     renderBoard(playerColor === 'b');
     updateStatus();

     // Trigger AI
     isAiThinking = true;
     document.getElementById('thinking-overlay').classList.remove('hidden');
     // Small delay to allow UI to render the user's move first
     setTimeout(() => {
      makeAiMove();
     }, 100);
     return;
    }

    // Case 2: Clicked own piece (Select)
    if (piece && piece.color === game.turn()) {
     // Unselect old
     if (selectedSquare) {
      document.getElementById(`sq-${selectedSquare}`).classList.remove('selected');
     }

     selectedSquare = sqId;
     document.getElementById(`sq-${sqId}`).classList.add('selected');

     // Calculate moves
     possibleMoves = game.moves({ square: sqId, verbose: true });

     // Highlight moves
     possibleMoves.forEach(m => {
      const el = document.getElementById(`sq-${m.to}`);
      if (game.get(m.to)) {
       el.classList.add('possible-capture');
      } else {
       el.classList.add('possible-move');
      }
     });
     return;
    }

    // Case 3: Clicked empty or enemy (Deselect)
    if (selectedSquare) {
     document.getElementById(`sq-${selectedSquare}`).classList.remove('selected');
    }
    selectedSquare = null;
    possibleMoves = [];
   }

   function undoMove() {
    if (isAiThinking) return;
    // Undo twice (AI and Player)
    game.undo();
    game.undo();
    renderBoard(playerColor === 'b');
    updateStatus();
    selectedSquare = null;
    possibleMoves = [];
   }

   function showGameOver(winner) {
    const modal = document.getElementById('game-over-modal');
    const title = document.getElementById('game-result-title');
    const desc = document.getElementById('game-result-desc');

    modal.classList.remove('hidden');
    if (winner === 'draw') {
     title.innerText = "引き分け";
     desc.innerText = "ステイルメイト、または同形反復";
    } else if (winner === '白') {
     title.innerText = "白の勝利！";
     title.classList.add('text-yellow-400');
     desc.innerText = playerColor === 'w' ? "おめでとうございます！" : "AIの勝ちです。";
    } else {
     title.innerText = "黒の勝利！";
     title.classList.add('text-yellow-400');
     desc.innerText = playerColor === 'b' ? "おめでとうございます！" : "AIの勝ちです。";
    }
   }


   /**
    * AI LOGIC (Minimax with Alpha-Beta Pruning)
    */
   function makeAiMove() {
    if (game.game_over()) return;

    const depth = aiDifficulty; // 1, 2, or 3

    // Use timeout to unblock rendering thread
    setTimeout(() => {
     let bestMove = null;

     // Level 1: Very simple (Evaluation only or shallow search)
     // Level 3: Deeper search
     bestMove = getBestMove(game, depth);

     if (bestMove) {
      game.move(bestMove);
      renderBoard(playerColor === 'b');
      updateStatus();
     }

     isAiThinking = false;
     document.getElementById('thinking-overlay').classList.add('hidden');
    }, 50);
   }

   function getBestMove(game, depth) {
    let possibleMoves = game.moves();
    if (possibleMoves.length === 0) return null;

    // Randomize slightly for variety in opening
    possibleMoves.sort(() => Math.random() - 0.5);

    let bestMove = null;
    let bestValue = -Infinity;
    let alpha = -Infinity;
    let beta = Infinity;

    // For depth 1, we just pick the best immediate move (or random if easy)
    if (depth === 1 && Math.random() < 0.2) {
     return possibleMoves[Math.floor(Math.random() * possibleMoves.length)];
    }

    let isMaximizing = true; // AI is always maximizing its own score

    for (let i = 0; i < possibleMoves.length; i++) {
     game.move(possibleMoves[i]);
     // Note: After moving, it's the opponent's turn, so we call minimize
     let boardValue = minimax(game, depth - 1, alpha, beta, !isMaximizing);
     game.undo();

     if (boardValue > bestValue) {
      bestValue = boardValue;
      bestMove = possibleMoves[i];
     }
     alpha = Math.max(alpha, bestValue);
    }
    return bestMove;
   }

   function minimax(game, depth, alpha, beta, isMaximizing) {
    if (depth === 0 || game.game_over()) {
     return evaluateBoard(game.board());
    }

    let possibleMoves = game.moves();

    if (isMaximizing) {
     let maxEval = -Infinity;
     for (let i = 0; i < possibleMoves.length; i++) {
      game.move(possibleMoves[i]);
      let eval = minimax(game, depth - 1, alpha, beta, false);
      game.undo();
      maxEval = Math.max(maxEval, eval);
      alpha = Math.max(alpha, eval);
      if (beta <= alpha) break;
     }
     return maxEval;
    } else {
     let minEval = Infinity;
     for (let i = 0; i < possibleMoves.length; i++) {
      game.move(possibleMoves[i]);
      let eval = minimax(game, depth - 1, alpha, beta, true);
      game.undo();
      minEval = Math.min(minEval, eval);
      beta = Math.min(beta, eval);
      if (beta <= alpha) break;
     }
     return minEval;
    }
   }

   function evaluateBoard(board) {
    let totalEvaluation = 0;

    // AI is playing the color that is NOT playerColor
    // But minimax assumes Maximizing player is current turn at root?
    // Let's stick to: Positive score = Good for AI (who is calling this)

    // However, simplest eval is: White Score - Black Score
    // Then flip sign if AI is Black.

    for (let i = 0; i < 8; i++) {
     for (let j = 0; j < 8; j++) {
      totalEvaluation += getPieceValue(board[i][j], i, j);
     }
    }

    // Adjust perspective: The AI wants to maximize THIS function if it's white, minimize if black?
    // Actually, in getBestMove, AI sets "isMaximizing = true".
    // So evaluateBoard should return (AI Score - Opponent Score).

    const aiColor = playerColor === 'w' ? 'b' : 'w';
    if (aiColor === 'b') {
     return -totalEvaluation; // Invert because standard eval is White-Positive
    }
    return totalEvaluation;
   }

   function getPieceValue(piece, x, y) {
    if (piece === null) return 0;

    let absoluteValue = pieceValues[piece.type];

    // Add positional value
    if (piece.type === 'p') {
     absoluteValue += (piece.color === 'w' ? pawnEvalWhite[x][y] : pawnEvalWhite[7 - x][y]);
    } else if (piece.type === 'n') {
     absoluteValue += knightEval[x][y];
    } else if (piece.type === 'k') {
     // Encourge King safety (corners) in midgame? Or simplify.
     // Just small bias is enough.
    }

    return piece.color === 'w' ? absoluteValue : -absoluteValue;
   }

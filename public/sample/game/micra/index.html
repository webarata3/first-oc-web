<!DOCTYPE html>
<html lang="ja">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Voxel Game</title>
  <style>
   /* 画面のスクロールバーを消し、余白をなくす */
   body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #000;
   }

   /* ゲーム開始前のオーバーレイ画面 */
   #blocker {
    position: absolute;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
   }

   /* 操作説明のテキスト */
   #instructions {
    text-align: center;
    color: white;
    cursor: pointer;
    padding: 30px;
    border: 2px solid white;
    border-radius: 10px;
    background-color: rgba(0, 0, 0, 0.4);
   }

   /* 画面中央の照準（クロスヘア） */
   #crosshair {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255, 255, 255, 0.8);
    font-size: 28px;
    font-weight: 300;
    pointer-events: none;
    /* マウスイベントを貫通させる */
    z-index: 5;
    text-shadow: 1px 1px 2px black;
   }

   /* 左下のブロック選択UI */
   #ui {
    position: absolute;
    bottom: 20px;
    left: 20px;
    color: white;
    background: rgba(0, 0, 0, 0.5);
    padding: 15px;
    border-radius: 8px;
    z-index: 5;
    pointer-events: none;
   }

   .block-item {
    margin: 8px 0;
    opacity: 0.5;
    transition: all 0.2s;
   }

   /* 選択中のブロックのスタイル */
   .selected {
    opacity: 1;
    color: #ffeb3b;
    font-weight: bold;
    transform: scale(1.1);
    transform-origin: left;
   }
  </style>

  <!-- Three.jsとアドオンをCDNからモジュールとして読み込むための設定 -->
  <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.159.0/examples/jsm/"
            }
        }
    </script>
 </head>
 <body>
  <!-- 画面中央の照準 -->
  <div id="crosshair">+</div>

  <!-- 左下のインベントリUI -->
  <div id="ui">
   <div id="block-1" class="block-item selected">1: 土ブロック</div>
   <div id="block-2" class="block-item">2: 石ブロック</div>
   <div id="block-3" class="block-item">3: 木ブロック</div>
   <div id="block-4" class="block-item">4: レンガブロック</div>
  </div>

  <!-- 開始画面・ポーズ画面 -->
  <div id="blocker">
   <div id="instructions">
    <h1 style="font-size:36px; margin-top:0;">クリックしてプレイ開始</h1>
    <p style="font-size: 18px; line-height: 1.6;">
     <b>WASD</b>: 移動 &nbsp;|&nbsp; <b>Space</b>: ジャンプ &nbsp;|&nbsp; <b>マウス</b>: 視点操作<br>
     <b>左クリック</b>: 破壊 &nbsp;|&nbsp; <b>右クリック</b>: 設置<br>
     <b>1〜4キー</b>: ブロックの種類を変更<br>
     <small>（終了・マウスを戻すには ESCキー）</small>
    </p>
   </div>
  </div>

  <!-- メインのスクリプト -->
  <script type="module">
   import * as THREE from 'three';
   import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

   // --- 1. グローバル変数の定義 ---
   let camera, scene, renderer, controls;
   const objects = []; // 設置されているすべてのブロックを格納する配列
   let raycaster;      // 視線判定用

   // 移動・物理演算用の変数
   let moveForward = false;
   let moveBackward = false;
   let moveLeft = false;
   let moveRight = false;
   let canJump = false;

   let prevTime = performance.now();
   const velocity = new THREE.Vector3(); // プレイヤーの速度
   const direction = new THREE.Vector3(); // プレイヤーの移動方向

   // ブロックの形状（1x1x1の立方体）を共通化してメモリを節約
   const boxGeo = new THREE.BoxGeometry(1, 1, 1);

   // ブロックの色（マテリアル）の定義
   const materials = {
    1: new THREE.MeshLambertMaterial({ color: 0x8B4513 }), // 土 (茶色)
    2: new THREE.MeshLambertMaterial({ color: 0x808080 }), // 石 (グレー)
    3: new THREE.MeshLambertMaterial({ color: 0x5C4033 }), // 木 (焦げ茶)
    4: new THREE.MeshLambertMaterial({ color: 0xB22222 })  // レンガ (赤茶)
   };
   const grassMaterial = new THREE.MeshLambertMaterial({ color: 0x55aa55 }); // 初期島の草ブロック(緑)
   const leafMaterial = new THREE.MeshLambertMaterial({ color: 0x2E8B57 }); // 葉っぱブロック(深緑)

   let currentMaterialIndex = 1; // 現在選択中のブロック番号

   // --- 2. 初期化処理 ---
   init();
   animate(); // アニメーションループ開始

   function init() {
    // シーンの作成
    scene = new THREE.Scene();
    // 空の色をスカイブルーに設定
    scene.background = new THREE.Color(0x87CEEB);
    // 遠くが霞んで見えるように霧（Fog）を設定（海との境界を自然にするため）
    scene.fog = new THREE.Fog(0x87CEEB, 20, 100);

    // カメラの作成（視野角, アスペクト比, 描画開始距離, 描画終了距離）
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.y = 20; // プレイヤーの初期高さを上げて空中から降らせる（地形が高くなったため）

    // ライトの追加（明るさと影を作るため）
    const ambientLight = new THREE.AmbientLight(0xeeeeee, 0.6); // 全体を照らす光
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8); // 太陽のような平行光
    directionalLight.position.set(20, 50, 20);
    scene.add(directionalLight);

    // FPSコントロール（PointerLockControls）の設定
    controls = new PointerLockControls(camera, document.body);

    // クリックしてゲームを開始するUIの制御
    const blocker = document.getElementById('blocker');
    const instructions = document.getElementById('instructions');

    instructions.addEventListener('click', function () {
     controls.lock(); // マウスをロックしてゲーム画面に没入させる
    });

    controls.addEventListener('lock', function () {
     instructions.style.display = 'none';
     blocker.style.display = 'none';
    });

    controls.addEventListener('unlock', function () {
     blocker.style.display = 'flex';
     instructions.style.display = '';
    });

    scene.add(controls.getObject());

    // --- 3. ワールド生成 ---
    // ブロックを追加して管理配列に入れるヘルパー関数
    function addBlock(x, y, z, material) {
     const voxel = new THREE.Mesh(boxGeo, material);
     voxel.position.set(x, y, z);
     scene.add(voxel);
     objects.push(voxel);
    }

    // 自然な形、起伏のある広い島を生成
    const radius = 35; // 島の広さ（半径）

    for (let x = -radius; x < radius; x++) {
     for (let z = -radius; z < radius; z++) {
      // 中心からの距離
      const dist = Math.sqrt(x * x + z * z);

      // 島の輪郭を不規則にするためのノイズ計算
      const angle = Math.atan2(z, x);
      const edgeNoise = Math.sin(angle * 6) * 4 + Math.cos(angle * 4) * 3;
      const modifiedRadius = radius + edgeNoise;

      // 円形の外側は生成しない（海になる）
      if (dist > modifiedRadius) continue;

      // 端に行くほど高さが海面に向かって下がるようなマスク
      const edgeMask = Math.max(0, 1 - (dist / modifiedRadius));

      // 地形の高さ（起伏）を複数の波の合成で表現（簡易ノイズ）
      const noiseHeight =
       Math.sin(x * 0.15) * 3 +
       Math.cos(z * 0.15) * 3 +
       Math.sin(x * 0.08 + z * 0.07) * 4;

      // 最終的なY座標（中心ほど高く、端は下がる。+4で全体をかさ上げ）
      let y = Math.floor((noiseHeight + 4) * edgeMask);

      // 水面(y=0未満)は海になるのでブロックを置かない
      if (y < 0) continue;

      // 高さによって表面のブロックの種類を変える（山や水際を表現）
      let surfaceMaterial = grassMaterial;
      if (y > 5) surfaceMaterial = materials[2]; // 高い場所は「石」（山）
      else if (y === 0) surfaceMaterial = materials[1]; // 水際は「土」

      // 表面ブロックの配置
      addBlock(x, y, z, surfaceMaterial);

      // 掘れるように表面の少し下にもブロックを埋める
      if (y > 0) addBlock(x, y - 1, z, materials[1]); // 1つ下は土
      if (y > 1 && surfaceMaterial === materials[2]) addBlock(x, y - 2, z, materials[2]); // 山なら更に下は石

      // --- 木の生成 ---
      // 草ブロックの上で、適度な高さの平地に、約2%の確率で木を生やす
      if (surfaceMaterial === grassMaterial && y >= 1 && y <= 4 && Math.random() < 0.02) {
       const treeHeight = Math.floor(Math.random() * 2) + 3; // 幹の高さ（3か4）

       // 幹を配置
       for (let i = 1; i <= treeHeight; i++) {
        addBlock(x, y + i, z, materials[3]);
       }

       // 葉っぱを配置（幹の上部周辺）
       const topY = y + treeHeight;
       for (let lx = -2; lx <= 2; lx++) {
        for (let ly = -1; ly <= 1; ly++) {
         for (let lz = -2; lz <= 2; lz++) {
          // 丸みを持たせるために角を削る
          if (Math.abs(lx) + Math.abs(ly) + Math.abs(lz) > 3) continue;
          // 幹と重なる部分はスキップ
          if (lx === 0 && lz === 0 && ly < 1) continue;

          addBlock(x + lx, topY + ly, z + lz, leafMaterial);
         }
        }
       }
      }
     }
    }

    // 海（水面）の生成
    const seaGeo = new THREE.PlaneGeometry(2000, 2000); // 広いフィールドに合わせて海も大きく
    const seaMat = new THREE.MeshLambertMaterial({ color: 0x40a4df, transparent: true, opacity: 0.6 });
    const sea = new THREE.Mesh(seaGeo, seaMat);
    sea.rotation.x = -Math.PI / 2; // 面を水平に寝かせる
    sea.position.y = -0.2; // 地面より少し下に配置
    scene.add(sea);

    // Raycasterの初期化（ブロックの設置・破壊・当たり判定用）
    raycaster = new THREE.Raycaster();

    // レンダラーの作成とHTMLへの追加
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // --- 4. イベントリスナーの設定 ---
    // キーボード入力処理（移動）
    const onKeyDown = function (event) {
     switch (event.code) {
      case 'ArrowUp':
      case 'KeyW': moveForward = true; break;
      case 'ArrowLeft':
      case 'KeyA': moveLeft = true; break;
      case 'ArrowDown':
      case 'KeyS': moveBackward = true; break;
      case 'ArrowRight':
      case 'KeyD': moveRight = true; break;
      case 'Space':
       if (canJump === true) velocity.y += 10; // ジャンプ力
       canJump = false;
       break;
      // ブロック選択の切り替え
      case 'Digit1': selectBlock(1); break;
      case 'Digit2': selectBlock(2); break;
      case 'Digit3': selectBlock(3); break;
      case 'Digit4': selectBlock(4); break;
     }
    };

    const onKeyUp = function (event) {
     switch (event.code) {
      case 'ArrowUp':
      case 'KeyW': moveForward = false; break;
      case 'ArrowLeft':
      case 'KeyA': moveLeft = false; break;
      case 'ArrowDown':
      case 'KeyS': moveBackward = false; break;
      case 'ArrowRight':
      case 'KeyD': moveRight = false; break;
     }
    };

    document.addEventListener('keydown', onKeyDown);
    document.addEventListener('keyup', onKeyUp);

    // 右クリックメニュー（ブラウザ標準）を禁止する
    document.addEventListener('contextmenu', e => e.preventDefault());

    // クリックでのブロック設置・破壊処理
    document.addEventListener('mousedown', onMouseClick);

    // ウィンドウのリサイズ対応
    window.addEventListener('resize', onWindowResize);
   }

   // --- 5. ゲームの主要機能関数 ---

   // UIのブロック選択表示を切り替える関数
   function selectBlock(index) {
    currentMaterialIndex = index;
    document.querySelectorAll('.block-item').forEach(el => el.classList.remove('selected'));
    document.getElementById(`block-${index}`).classList.add('selected');
   }

   // マウスクリック処理（ブロックの破壊と設置）
   function onMouseClick(event) {
    if (!controls.isLocked) return; // プレイ中以外は無視

    // 画面の中央（0, 0）から視線方向にRay（光線）を飛ばす
    raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);

    // Rayと objects(ブロック群) の交差を判定
    const intersects = raycaster.intersectObjects(objects, false);

    if (intersects.length > 0) {
     const intersect = intersects[0];

     // 届く距離を制限（遠すぎるブロックは操作できない）
     if (intersect.distance > 6) return;

     if (event.button === 0) {
      // 左クリック：破壊
      scene.remove(intersect.object); // シーンから消す
      objects.splice(objects.indexOf(intersect.object), 1); // 当たり判定配列からも消す
     } else if (event.button === 2) {
      // 右クリック：設置
      const voxel = new THREE.Mesh(boxGeo, materials[currentMaterialIndex]);

      // クリックした面の法線ベクトル（向き）を足すことで、正確な隣接座標を算出する
      const newPos = intersect.object.position.clone().add(intersect.face.normal);
      voxel.position.copy(newPos);

      scene.add(voxel);
      objects.push(voxel);
     }
    }
   }

   // 画面サイズ変更時の対応
   function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
   }

   // --- 6. アニメーションループ（毎フレーム実行） ---
   function animate() {
    requestAnimationFrame(animate);

    const time = performance.now();

    // プレイヤーが操作中の場合のみ物理演算を行う
    if (controls.isLocked === true) {
     const delta = (time - prevTime) / 1000; // 前フレームからの経過時間（秒）

     // 速度の減衰（摩擦）
     velocity.x -= velocity.x * 10.0 * delta;
     velocity.z -= velocity.z * 10.0 * delta;

     // 重力の適用
     velocity.y -= 9.8 * 4.0 * delta;

     // 移動方向の決定
     direction.z = Number(moveForward) - Number(moveBackward);
     direction.x = Number(moveRight) - Number(moveLeft);
     direction.normalize(); // 斜め移動が速くならないように正規化

     // 移動キーが押されていれば速度を加算
     const speed = 40.0;
     if (moveForward || moveBackward) velocity.z -= direction.z * speed * delta;
     if (moveLeft || moveRight) velocity.x -= direction.x * speed * delta;

     // --- 当たり判定処理 ---
     const playerPos = controls.getObject().position;

     // 1. 床の判定（下向きのRaycaster）
     raycaster.ray.origin.copy(playerPos);
     raycaster.ray.origin.y -= 1.0; // 胴体あたりから下へ
     raycaster.ray.direction.set(0, -1, 0);

     const floorIntersects = raycaster.intersectObjects(objects, false);
     const onFloor = floorIntersects.length > 0 && floorIntersects[0].distance < 0.6; // 足元0.6以内にブロックがあるか

     if (onFloor) {
      velocity.y = Math.max(0, velocity.y); // 落下を止める
      canJump = true; // 着地したのでジャンプ可能に
     }

     // 2. 壁の判定（簡易版：移動しようとしている方向にRaycaster）
     // X軸方向の壁チェック
     if (Math.abs(velocity.x) > 0) {
      raycaster.ray.origin.copy(playerPos);
      raycaster.ray.origin.y -= 0.5; // 目の高さから少し下（足元が引っかからないように）
      raycaster.ray.direction.set(velocity.x > 0 ? 1 : -1, 0, 0);
      const wallX = raycaster.intersectObjects(objects, false);
      if (wallX.length > 0 && wallX[0].distance < 0.5) {
       velocity.x = 0; // 壁にぶつかったらX軸の速度を0に
      }
     }

     // Z軸方向の壁チェック
     if (Math.abs(velocity.z) > 0) {
      raycaster.ray.origin.copy(playerPos);
      raycaster.ray.origin.y -= 0.5;
      raycaster.ray.direction.set(0, 0, velocity.z > 0 ? 1 : -1);
      const wallZ = raycaster.intersectObjects(objects, false);
      if (wallZ.length > 0 && wallZ[0].distance < 0.5) {
       velocity.z = 0; // 壁にぶつかったらZ軸の速度を0に
      }
     }

     // 速度を実際の座標に適用
     controls.moveRight(-velocity.x * delta);
     controls.moveForward(-velocity.z * delta);
     controls.getObject().position.y += (velocity.y * delta);

     // --- 落下（落水）判定 ---
     // 海面（Y=-0.2）を突き抜けて深く落ちすぎた場合は初期位置に戻す
     if (playerPos.y < -5) {
      // 地形が高くなったため、Y=20の空中からリスポーンさせる
      playerPos.set(0, 20, 0);
      velocity.set(0, 0, 0);
     }
    }

    prevTime = time;
    renderer.render(scene, camera);
   }
  </script>
 </body>
</html>
